<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hassan Alnabres — Game Score Panel</title>
  <link rel="stylesheet" href="./styles/style.css" />
</head>
<body>

 <header>
    <h1>Hassan Alnabres — Game Simulator</h1>
    <p class="subtitle">This page simulates game actions with buttons.</p>
  </header>
  
  <main>
    <section>
      <button id="save-player-btn">Save Player</button>
      <button id="record-score-btn">Record High Score</button>
      <button id="reset-game-btn">Reset Game</button>
      <button id="view-leaderboard-btn">View Leaderboard</button>
    </section>

    <section>
      <h2>Status</h2>
      <div id="status-message">Ready.</div>
    </section>

    <section>
      <h2>Leaderboard</h2>
      <ol id="leaderboard-list"></ol>
    </section>
  </main>

  <script type="module" src="./scripts/controllers/game-controller.js"></script>
</body>
</html>
